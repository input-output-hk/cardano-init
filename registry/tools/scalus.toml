[tool]
id = "scalus"
name = "Scalus"
description = """\
A Scala-native toolkit for Cardano. Scalus can compile Scala code \
to UPLC for on-chain validators and build transactions for off-chain \
interaction — all in one language. Its off-chain tests run validators \
locally. Choose it for one role or both."""
website = "https://scalus.org"
languages = ["scala"]
system_deps = ["sbt", "jvm"]
nix_packages = ["sbt", "jdk"]

[roles.on-chain]
template = "scalus/on-chain"

[roles.off-chain]
template = "scalus/off-chain"
