# Dependency recipes for the `cardano-init doctor` (TECH_SPEC §9.2).
#
# Keyed by dep id. Each recipe has:
#   binaries  presence check — the dep is present if any of these is on PATH
#   docs      universal fallback when the resolver can't produce a plan
#   install   ordered list of single-key { installer = arg } methods (order = preference)
#
# Installer keys are validated against the closed `Installer` enum in
# src/doctor/installers.rs at load (unknown installer → load error). Recipes are
# data; installers are code. Shared deps (node, jvm) are defined once and
# referenced by many tools' `system_deps`.

# --- base / derived dep (owned by no tool) ---

[just]
binaries = ["just"]
docs = "https://just.systems"
install = [{ brew = "just" }, { apt = "just" }, { cargo = "just" }, { nix = "just" }]

# --- tool system_deps ---

[node]
binaries = ["node"]
docs = "https://nodejs.org/en/download"
install = [{ brew = "node" }, { apt = "nodejs" }, { winget = "OpenJS.NodeJS" }, { nix = "nodejs" }]

[aiken]
binaries = ["aiken"]
docs = "https://aiken-lang.org/installation-instructions"
install = [{ aikup = "latest" }, { nix = "aiken" }]

[sbt]
binaries = ["sbt"]
docs = "https://www.scala-sbt.org/download.html"
install = [{ brew = "sbt" }, { apt = "sbt" }, { nix = "sbt" }]

[jvm]
binaries = ["java"]
docs = "https://adoptium.net/installation"
install = [{ brew = "openjdk" }, { apt = "default-jdk" }, { winget = "EclipseAdoptium.Temurin.21.JDK" }, { nix = "jdk" }]

[docker]
binaries = ["docker"]
docs = "https://docs.docker.com/get-docker/"
install = [{ brew = "docker" }, { apt = "docker.io" }, { winget = "Docker.DockerDesktop" }, { nix = "docker" }]

# --- installer-provider deps (reached via installer `bootstrap` lists) ---

[aikup]
binaries = ["aikup"]
docs = "https://aiken-lang.org/installation-instructions"
install = [{ npm = "@aiken-lang/aikup" }, { curl = "https://install.aiken-lang.org" }, { powershell = "https://windows.aiken-lang.org" }]

[cardano-up]
binaries = ["cardano-up"]
docs = "https://github.com/blinklabs-io/cardano-up"
install = [{ go = "github.com/blinklabs-io/cardano-up/cmd/cardano-up@latest" }]

[rustup]
binaries = ["rustup"]
docs = "https://www.rust-lang.org/tools/install"
install = [{ brew = "rustup" }, { curl = "https://sh.rustup.rs" }, { nix = "rustup" }]

[rust]
binaries = ["cargo", "rustc"]
docs = "https://www.rust-lang.org/tools/install"
install = [{ curl = "https://sh.rustup.rs" }, { nix = "cargo" }]

[go]
binaries = ["go"]
docs = "https://go.dev/doc/install"
install = [{ brew = "go" }, { apt = "golang" }, { winget = "GoLang.Go" }, { nix = "go" }]

# --- catalog reference (no tool requires it today; see §9.1) ---

[process-compose]
binaries = ["process-compose"]
docs = "https://f1bonacc1.github.io/process-compose/"
install = [{ brew = "process-compose" }, { go = "github.com/f1bonacc1/process-compose@latest" }, { nix = "process-compose" }]
